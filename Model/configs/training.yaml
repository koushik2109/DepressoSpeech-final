dataset:
  feature_dir: data/npz
  id_column: participant_id
  label_column: phq_score
  train_split: data/splits/train_split.csv
  val_split: data/splits/dev_split.csv
features:
  audio_dim: 62
  text_dim: 384
  video_dim: 49
logging:
  experiment_name: multimodal_v4
  log_dir: logs_v4
loss:
  # Keep exact weights from multimodal_v3 that achieved CCC=0.5058
  ccc_weight: 30.0
  regression_weight: 0.3
  question_weight: 0.25
  classification_weight: 0.05
  confidence_weight: 0.01
  entropy_weight: 0.2
  # Zero gate_balance → text can freely exceed 1/3 without competing loss
  gate_balance_weight: 0.0
  # Text gate preference — penalise when text gate < 0.40
  text_gate_weight: 0.25
  text_gate_target: 0.40
model:
  # Exact dims from multimodal_v3 (proven CCC=0.5058, 91K params)
  audio_dim: 33
  video_dim: 40
  text_dim: 163
  dropout: 0.45
  encoder_type: conv_gru
  fusion_dim: 32
  fusion_mode: hybrid
  modality_dropout: 0.20
  num_heads: 4
  num_layers: 1
  num_questions: 8
regularization:
  feature_noise_std: 0.06
  temporal_dropout_rate: 0.20
training:
  batch_size: 16
  early_stopping_min_delta: 0.001
  early_stopping_patience: 200
  grad_clip_norm: 1.0
  learning_rate: 0.001
  lr_factor: 0.5
  lr_patience: 30
  max_epochs: 1000
  num_workers: 0
  use_amp: true
  weight_decay: 8e-3
  mixup_alpha: 0.3
