# =============================================================================
# Trimodal Fusion V2 Configuration
# Audio + Video + Text with Cross-Modal Attention
# =============================================================================

# --- Data ---
data:
  train_csv: "data/splits/train_split.csv"
  dev_csv: "data/splits/dev_split.csv"
  label_column: "PHQ_Score"
  id_column: "Participant_ID"
  batch_size: 56
  phq_threshold: 10

# --- Feature Dimensions ---
features:
  # Audio
  mfcc_dim: 120
  egemaps_dim: 88
  behavioral_dim: 16
  # Video
  openface_dim: 49          # pose(6) + gaze(8) + AUs(35)
  cnn_dim: 512              # ResNet18/34=512, ResNet50/VGG16=2048
  # Text
  text_dim: 384             # SBERT all-MiniLM-L6-v2

# --- Model Architecture ---
model:
  fusion_dim: 128           # Shared projection dimension
  num_attention_heads: 4    # Cross-modal attention heads
  stats_mode: "mean_std"    # Statistics pooling mode
  dropout: 0.1
  modality_dropout: 0.15    # Drop entire modality during training

# --- Loss ---
loss:
  type: "weighted_mse"
  phq_threshold: 10
  high_weight: 2.0
  low_weight: 1.0

# --- Augmentation ---
augmentation:
  temporal_dropout_rate: 0.1
  feature_noise_std: 0.005
  label_noise_std: 0.15

# --- Staged Training ---
stages:
  # Stage 1: Text-only (freeze audio+video)
  stage1:
    lr: 5.0e-3
    weight_decay: 0.1
    epochs: 500
    patience: 100
    freeze: ["audio_encoder", "video_encoder", "audio_proj", "video_proj"]

  # Stage 2: Audio+Text (freeze video, unfreeze audio)
  stage2:
    lr: 3.0e-3
    weight_decay: 0.05
    epochs: 300
    patience: 80
    freeze: ["video_encoder", "video_proj"]

  # Stage 3: Full trimodal (all unfrozen)
  stage3:
    lr: 1.0e-3
    weight_decay: 0.05
    epochs: 200
    patience: 60
    freeze: []

# --- Training Loop ---
training:
  gradient_clip_norm: 1.0
  seed: 42

# --- Checkpointing ---
checkpointing:
  save_dir: "checkpoints"
  save_best: true

# --- Feature Paths (per session) ---
feature_paths:
  mfcc: "data/features/{pid}/mfcc.csv"
  egemaps: "data/features/{pid}/egemaps.csv"
  behavioral: "data/features/{pid}/behavioral.csv"
  openface: "data/features/{pid}/openface.csv"
  cnn_embed: "data/features/{pid}/cnn_embed.csv"
  text: "data/features/{pid}/text_embeddings.csv"

# --- Logging ---
logging:
  log_dir: "logs"
